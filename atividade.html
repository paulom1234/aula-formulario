<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Professor</title>
</head>
<body>

    <h1>Cadastro do Professor</h1>
    <form>

        <!-- input nome -->
        <label for="nome">Nome: </label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu Nome" required>

        <!-- input email -->
        <label for="email">Email: </label>
        <input type="email" name="email" id="email" placeholder="Digite seu Email" required>

        <!-- input senha -->
        <label for="password">Senha: </label>
        <input type="password" name="senha" id="password" placeholder="Digite sua senha" required>

        <!-- input select -->
        <label for="cidade">Cidade: </label>
        <select name="cidade" id="cidade" required>

            <option>Selecione sua cidade</option>
            <option>Londrina</option>
            <option>Curitiba</option>
            <option>Maringá</option>

        </select>
        <!-- input select 2 -->
        <label for="escola">Escola mais proxima de você: </label>
        <select name="escola" id="escola" required>

            <option>Selecione a escola</option>
            <option>IEEL</option>
            <option>Colégio Santa Cruz</option>
            <option>Colégio Estadual Júlia Wanderley</option>
        </select>
       
        <label for="historico">Já tem experiencia dando aula?</label>
        <input type="radio" name="" id="historico">
        Sim

            
    
           
    </form>
    
</body>
</html>
